# .github/workflows/deploy.yml
name: Deploy AI Voice Platform

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_LOCATION: swedencentral
  PROJECT_NAME: aivoice
  ENVIRONMENT: dev
  CONTAINER_APP_NAME: ca-aivoice-dev
  RESOURCE_GROUP: rg-aivoice-dev
  ACR_NAME: acraivoicedev

jobs:
  deploy-infra:
    name: Deploy Bicep Infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep
        uses: azure/arm-deploy@v2
        with:
          scope: subscription
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          region: ${{ env.AZURE_LOCATION }}
          template: ./infra/main.bicep
          parameters: >
            environment=${{ env.ENVIRONMENT }}
            location=${{ env.AZURE_LOCATION }}
            projectName=${{ env.PROJECT_NAME }}
          failOnStdErr: false

  deploy-voiceagent:
    name: Build & Deploy Voice Agent
    runs-on: ubuntu-latest
    needs: deploy-infra
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push Docker image
        run: |
          docker build ./voiceagent -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/voiceagent:${{ github.sha }}
          docker build ./voiceagent -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/voiceagent:latest
          docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/voiceagent:${{ github.sha }}
          docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/voiceagent:latest

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ secrets.REGISTRY_LOGIN_SERVER }}/voiceagent:${{ github.sha }}